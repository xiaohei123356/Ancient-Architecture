<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梁间集语 | 营造法式</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* --- 梁间集语页独有样式 --- */
        
        .forum-header {
            text-align: center;
            padding: 60px 0 40px;
        }

        .forum-header h2 {
            font-size: 32px;
            color: #1a1a1a;
            letter-spacing: 4px;
            margin-bottom: 15px;
        }

        .forum-header p {
            font-size: 15px;
            color: #666;
            letter-spacing: 2px;
        }

        /* 论坛双栏布局：左侧写留言，右侧看留言 */
        .forum-layout {
            display: grid;
            grid-template-columns: 350px 1fr; /* 左侧固定350px宽，右侧自适应 */
            gap: 60px;
            padding-bottom: 100px;
            align-items: start;
        }

        /* 左侧：留言表单区域 */
        .post-form-wrapper {
            background: #fff;
            padding: 40px 30px;
            border: 1px solid #eae5de;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            position: sticky; /* 页面滚动时，左侧表单固定在屏幕上 */
            top: 40px; 
        }

        .post-form-wrapper h3 {
            font-size: 20px;
            color: #8b1818;
            margin-bottom: 30px;
            border-bottom: 1px solid #eae5de;
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .form-input, .form-textarea {
            width: 100%;
            background: #FAFAFA;
            border: 1px solid #eae5de;
            padding: 12px 15px;
            font-size: 14px;
            color: #333;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-input:focus, .form-textarea:focus {
            border-color: #8b1818;
            background: #fff;
        }

        .submit-btn {
            width: 100%;
            background: #8b1818;
            color: #fff;
            border: none;
            padding: 15px 0;
            font-size: 16px;
            letter-spacing: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background: #6a1010;
        }

        /* 右侧：留言列表区域 */
        .message-feed {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* 单条留言卡片：设计成信笺的感觉 */
        .post-card {
            background: #fff;
            padding: 35px 40px;
            border: 1px solid #eae5de;
            border-left: 3px solid #d6d0c4; /* 左侧加粗一点的边框作为视觉锚点 */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideDown 0.5s ease forwards; /* 新留言出现的动画 */
        }

        .post-card:hover {
            transform: translateX(5px); /* 鼠标放上去微微向右偏移 */
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            border-left-color: #8b1818; /* 悬停时左侧边框变红 */
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .post-author {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .post-date {
            font-size: 13px;
            color: #999;
            font-family: sans-serif;
        }

        .post-content {
            font-size: 15px;
            color: #555;
            line-height: 1.8;
            text-align: justify;
        }

        /* 响应式：屏幕太小时（如手机），变成上下布局 */
        @media (max-width: 800px) {
            .forum-layout {
                grid-template-columns: 1fr;
            }
            .post-form-wrapper {
                position: static;
            }
        }

        /* 动画定义 */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" class="logo serif-text">营造法式</a>
            <nav>
                <a href="index.html">首页</a>
                <a href="search.html">营造索引</a>
                <a href="chat.html">与匠对谈</a>
                <a href="forum.html" class="active">梁间集语</a>
                <a href="login.html">登录</a>
            </nav>
        </header>

        <div class="forum-header">
            <h2 class="serif-text">梁间集语</h2>
            <p>寻同好，论古建，留墨香于此</p>
        </div>

        <div class="forum-layout">
            
            <div class="post-form-wrapper">
                <h3 class="serif-text">提笔落墨</h3>
                <div class="form-group">
                    <label class="form-label">雅号 (昵称)</label>
                    <input type="text" id="authorInput" class="form-input" placeholder="客官尊姓大名？">
                </div>
                <div class="form-group">
                    <label class="form-label">所感所想</label>
                    <textarea id="contentInput" class="form-textarea" placeholder="在此写下您对古建的感悟或疑问..."></textarea>
                </div>
                <button id="publishBtn" class="submit-btn serif-text">留 墨</button>
            </div>

            <div class="message-feed" id="messageFeed">
                
                <div class="post-card">
                    <div class="post-header">
                        <span class="post-author serif-text">江南木匠</span>
                        <span class="post-date">2023-10-15</span>
                    </div>
                    <div class="post-content">
                        看完了科普，深感震撼。古人不用一根铁钉，仅凭榫卯就能让木构建筑抗震千年。尤其是应县木塔（虽不在本次1911非庙宇考纲内，但技法同源），层层斗拱简直是巧夺天工。希望这个网站能让更多年轻人了解我们的传统瑰宝。
                    </div>
                </div>

                <div class="post-card">
                    <div class="post-header">
                        <span class="post-author serif-text">寻古客</span>
                        <span class="post-date">2023-10-12</span>
                    </div>
                    <div class="post-content">
                        对“徽派建筑”那张卡片非常感兴趣。四水归堂的设计不仅是为了肥水不流外人田，更是在潮湿的江南地区解决通风和采光的完美方案。古人的实用主义与美学结合得太好了。
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        const publishBtn = document.getElementById('publishBtn');
        const authorInput = document.getElementById('authorInput');
        const contentInput = document.getElementById('contentInput');
        const messageFeed = document.getElementById('messageFeed');

        publishBtn.addEventListener('click', function() {
            // 获取输入的内容
            const author = authorInput.value.trim();
            const content = contentInput.value.trim();

            // 简单校验：如果没有填完，就提示
            if (author === '' || content === '') {
                alert("客官，雅号与所感皆需落墨，方可留存。");
                return;
            }

            // 获取今天的日期 (格式化为 YYYY-MM-DD)
            const today = new Date();
            const dateStr = today.getFullYear() + '-' + 
                            String(today.getMonth() + 1).padStart(2, '0') + '-' + 
                            String(today.getDate()).padStart(2, '0');

            // 构建新的留言卡片的 HTML 代码
            const newPostHTML = `
                <div class="post-card">
                    <div class="post-header">
                        <span class="post-author serif-text">${author}</span>
                        <span class="post-date">${dateStr}</span>
                    </div>
                    <div class="post-content">
                        ${content}
                    </div>
                </div>
            `;

            // 【核心魔法】：将新留言插入到留言列表的最顶端！
            messageFeed.insertAdjacentHTML('afterbegin', newPostHTML);

            // 发布成功后，清空输入框
            authorInput.value = '';
            contentInput.value = '';

            // 提示用户 (前端模拟)
            alert("落墨成功！\n\n（注：此为前端模拟交互，刷新页面后新留言会消失。真实环境中需由数据库永久保存）");
        });
    </script>
</body>
</html>
