<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登堂入室 | 营造法式</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* --- 登录页独有样式 --- */
        
        /* 让登录框在页面中垂直居中 */
        .login-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 120px); /* 减去导航栏的高度 */
            padding-bottom: 50px;
        }

        .login-box {
            background: #fff;
            width: 100%;
            max-width: 440px;
            padding: 60px 50px;
            border: 1px solid #eae5de;
            border-radius: 2px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            text-align: center;
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            margin-bottom: 40px;
        }

        .login-header h2 {
            font-size: 28px;
            color: #1a1a1a;
            letter-spacing: 6px;
            margin-bottom: 10px;
        }

        .login-header p {
            font-size: 14px;
            color: #8b1818;
            letter-spacing: 2px;
        }

        /* 表单输入区域：单底线高级设计 */
        .input-group {
            margin-bottom: 35px;
            position: relative;
            text-align: left;
        }

        .login-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #d6d0c4;
            padding: 10px 0;
            font-size: 16px;
            color: #333;
            outline: none;
            transition: border-color 0.3s;
        }

        .login-input:focus {
            border-bottom-color: #8b1818;
        }

        .login-input::placeholder {
            color: #bbb;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .login-btn {
            width: 100%;
            background: #8b1818;
            color: #fff;
            border: none;
            padding: 16px 0;
            font-size: 16px;
            letter-spacing: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #6a1010;
            box-shadow: 0 5px 15px rgba(139, 24, 24, 0.2);
        }

        .login-footer {
            margin-top: 30px;
            font-size: 13px;
            color: #999;
        }

        .login-footer a {
            color: #8b1818;
            text-decoration: none;
            margin-left: 5px;
            transition: opacity 0.3s;
        }

        .login-footer a:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" class="logo serif-text">营造法式</a>
            <nav>
                <a href="index.html">首页</a>
                <a href="search.html">营造索引</a>
                <a href="chat.html">与匠对谈</a>
                <a href="forum.html">梁间集语</a>
                <a href="login.html" class="active">登录</a>
            </nav>
        </header>

        <section class="login-section">
            <div class="login-box">
                <div class="login-header">
                    <h2 class="serif-text">登堂入室</h2>
                    <p class="serif-text">卷轶浩繁 · 邀君共赏</p>
                </div>

                <form id="loginForm">
                    <div class="input-group">
                        <input type="text" id="username" class="login-input" placeholder="雅号 (请输入任意测试账号)">
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" class="login-input" placeholder="口令 (请输入任意密码)">
                    </div>
                    
                    <button type="submit" class="login-btn serif-text">登 录</button>
                </form>

                <div class="login-footer">
                    尚未结缘？<a href="#">在此缔结 (注册)</a>
                </div>
            </div>
        </section>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        // 监听表单的提交事件
        loginForm.addEventListener('submit', function(event) {
            // 阻止表单的默认提交刷新行为（这是做高级Web应用的关键）
            event.preventDefault(); 

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            // 1. 简单的表单校验
            if (username === '' || password === '') {
                alert('客官，雅号与口令缺一不可。');
                return;
            }

            // 2. 模拟真实登录过程 (弹窗欢迎)
            alert(`【鉴权成功】\n欢迎归来，${username} 客官！\n即将为您开启营造法式的大门...`);

            // 3. 登录成功后，用 JS 控制页面自动跳转回首页 (index.html)
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
