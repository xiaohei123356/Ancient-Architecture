<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人小筑 - 古建智传</title>
    <style>
        /* 1. 营造图纸质感背景 */
        body {
            background-color: #faf8f5;
            background-image: 
                linear-gradient(#eceae4 1px, transparent 1px),
                linear-gradient(90deg, #eceae4 1px, transparent 1px);
            background-size: 40px 40px;
            color: #2c2c2c;
            font-family: "Noto Serif SC", STSong, "SimSun", serif;
            margin: 0;
            padding: 0;
        }

        /* 2. 核心布局：大留白非对称 */
        .xiaozhu-layout {
            max-width: 1000px;
            margin: 80px auto;
            display: flex;
            gap: 80px;
            padding: 0 20px;
        }

        /* 左侧：文献信息区 */
        .profile-side {
            flex: 0 0 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid rgba(0,0,0,0.05);
            padding-right: 60px;
        }

        /* 精致的印章设计 */
        .seal-wrapper {
            width: 86px;
            height: 86px;
            border: 2px solid #8c222c;
            border-radius: 50%;
            padding: 4px;
            position: relative;
            margin-bottom: 30px;
        }
        .seal-inner {
            width: 100%;
            height: 100%;
            border: 1px solid #8c222c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8c222c;
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 2px;
            opacity: 0.9; 
        }

        /* 左侧：雅号 */
        .user-title {
            font-size: 28px;
            color: #1a1a1a;
            letter-spacing: 4px;
            margin: 0 0 15px 0;
            font-weight: 900;
        }

        /* 左侧：个人箴言 */
        .user-bio-display {
            font-size: 16px;
            color: #333;
            line-height: 2.2;
            text-align: center;
            letter-spacing: 2px;
            position: relative;
            padding: 20px 0;
            font-weight: 500;
        }

        /* 右侧模块 */
        .profile-main { flex: 1; }

        .section-header {
            font-size: 26px !important;
            color: #8c222c !important; 
            letter-spacing: 4px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            font-weight: 900 !important; 
        }
        .section-header::after {
            content: ""; flex: 1; height: 1px;
            background: linear-gradient(90deg, rgba(140, 34, 44, 0.3), transparent);
            margin-left: 20px;
        }

        /* 古籍式输入框 */
        .form-row { display: flex; gap: 40px; margin-bottom: 35px; }
        .input-group { flex: 1; position: relative; }
        
        .input-group label {
            display: block; font-size: 16px !important;
            color: #555 !important; margin-bottom: 10px;
            letter-spacing: 2px; font-weight: 900 !important;
        }
        
        .classic-input {
            width: 100%; background: transparent; border: none;
            border-bottom: 1px solid #999; padding: 10px 0;
            font-size: 20px !important; font-family: inherit;
            color: #1a1a1a !important; font-weight: bold !important;
            outline: none; transition: border-color 0.4s;
        }
        .classic-input:focus { border-bottom-color: #8c222c; }
        .classic-input::placeholder { color: #999 !important; font-size: 16px !important; font-weight: normal !important; }
        
        textarea.classic-input {
            resize: none; line-height: 1.8; border: 1px solid #e0dcd5;
            padding: 15px; background: rgba(255,255,255,0.4);
        }
        textarea.classic-input:focus { border-color: #8c222c; background: transparent; }

        /* 动作按钮 */
        .btn-elegant {
            background: transparent; color: #8c222c; border: 1px solid #8c222c;
            padding: 12px 40px; font-family: inherit; font-size: 14px;
            letter-spacing: 4px; cursor: pointer; transition: all 0.4s; margin-top: 20px;
        }
        .btn-elegant:hover { background: #8c222c; color: #fff; }

        @media (max-width: 800px) {
            .xiaozhu-layout { flex-direction: column; gap: 40px; }
            .profile-side { border-right: none; border-bottom: 1px dashed rgba(0,0,0,0.1); padding-right: 0; padding-bottom: 40px; }
            .form-row { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

    <header style="padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(140, 34, 44, 0.1);">
        <a href="index.html" style="font-size: 20px; color: #8c222c; font-weight: bold; letter-spacing: 2px; text-decoration: none;">营造法式</a>
        <nav style="display: flex; align-items: center;">
            <a href="index.html" style="text-decoration: none; color: #666; margin-left: 30px;">首页</a>
            <a href="search.html" style="text-decoration: none; color: #666; margin-left: 30px;">营造索引</a>
            <a href="chat.html" style="text-decoration: none; color: #666; margin-left: 30px;">与匠对谈</a>
            <a href="forum.html" style="text-decoration: none; color: #666; margin-left: 30px;">梁间集语</a>
            <div id="nav-user-area" style="display: inline-flex; align-items: center; gap: 20px; margin-left: 30px;"></div>
        </nav>
    </header>

    <div class="xiaozhu-layout">
        
        <aside class="profile-side">
            <div class="seal-wrapper">
                <div class="seal-inner" id="dynamic-seal">匠</div>
            </div>
            <h2 class="user-title" id="dynamic-username">载入中...</h2>
            <div class="user-bio-display" id="bioDisplay">
                落纸云烟，皆是营造<br>
                在这里记录你的古建求索之路
            </div>
        </aside>

        <main class="profile-main">
            <form id="profileForm" onsubmit="event.preventDefault();">
                
                <div class="section-header">卷册信息</div>

                <div class="form-row">
                    <div class="input-group">
                        <label>雅号 (不可变更)</label>
                        <input type="text" class="classic-input" id="dynamic-input-name" value="" disabled style="color: #999;">
                    </div>
                    <div class="input-group">
                        <label>信札 (邮箱)</label>
                        <input type="email" class="classic-input" id="dynamic-input-email" value="" disabled style="color: #999;">
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>性别</label>
                        <select class="classic-input">
                            <option>隐去身形</option>
                            <option>男</option>
                            <option>女</option>
                        </select>
                    </div>
                    <div class="input-group">
                    <label>春秋 (年岁)</label>
                    <input type="number" class="classic-input" placeholder="输入芳龄" min="1" max="120">
                    </div>
                </div>

                <div class="input-group" style="margin-bottom: 60px;">
                    <label>营造感言</label>
                    <textarea class="classic-input" id="bioInput" rows="4" placeholder="写下你与古建筑的不解之缘..."></textarea>
                </div>

                <div class="section-header">口令重铸</div>

                <div class="form-row">
                    <div class="input-group">
                        <label>原口令</label>
                        <input type="password" class="classic-input" placeholder="输入当前使用的密码">
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>新口令</label>
                        <input type="password" class="classic-input" placeholder="8位以上包含字母与数字">
                    </div>
                    <div class="input-group">
                        <label>复验新口令</label>
                        <input type="password" class="classic-input" placeholder="再次输入确认">
                    </div>
                </div>

                <div style="text-align: right;">
                    <button type="button" class="btn-elegant" onclick="alert('功能暂未开放')">落笔封存</button>
                </div>

            </form>
        </main>

    </div>

    <script src="/assets/js/site.js"></script>

    <script>
        // 【核心修改点】页面一加载，就去后端拿真实身份填充坑位
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const response = await fetch('/api/me', { credentials: 'same-origin' });
                const data = await response.json();
                
                if (response.ok && data.user) {
                    const username = data.user.username;
                    const email = data.user.email;
                    
                    // 填入真实名字和邮箱
                    document.getElementById('dynamic-username').textContent = username;
                    document.getElementById('dynamic-input-name').value = username;
                    document.getElementById('dynamic-input-email').value = email;
                    
                    // 让印章显示名字的第一个字（或字母）
                    document.getElementById('dynamic-seal').textContent = username.charAt(0).toUpperCase();
                } else {
                    // 没登录的人，一脚踢去登录页
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error("拉取真实信息失败", error);
            }
        });

        // 实时同步简介
        document.getElementById('bioInput').addEventListener('input', function(e) {
            const display = document.getElementById('bioDisplay');
            if (e.target.value.trim() === '') {
                display.innerHTML = '落纸云烟，皆是营造<br>在这里记录你的古建求索之路';
            } else {
                display.innerHTML = e.target.value.replace(/\n/g, '<br>');
            }
        });
    </script>
</body>
</html>
