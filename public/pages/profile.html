<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人小筑 | 古建智传</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    
    <style>
        body {
            background-color: #fdfaf5;
            background-image: linear-gradient(#eceae4 1px, transparent 1px),
                              linear-gradient(90deg, #eceae4 1px, transparent 1px);
            background-size: 40px 40px;
            color: #2c2c2c;
            font-family: "Noto Serif SC", STSong, "SimSun", serif;
            margin: 0;
            padding: 0;
        }

        .xiaozhu-layout {
            max-width: 1000px;
            margin: 80px auto;
            display: flex;
            gap: 80px;
            padding: 0 20px;
            flex-direction: column;
        }

        .profile-side {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            border-right: none;
            padding-bottom: 40px;
            margin-bottom: 40px;
        }

        .seal-wrapper {
            width: 86px;
            height: 86px;
            border: 2px solid #8c222c;
            border-radius: 50%;
            padding: 4px;
            position: relative;
            margin-bottom: 30px;
        }

        .seal-inner {
            width: 100%;
            height: 100%;
            border: 1px solid #8c222c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8c222c;
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        .user-title {
            font-size: 28px;
            color: #1a1a1a;
            letter-spacing: 4px;
            margin: 0 0 15px 0;
            font-weight: 900;
        }

        .user-bio-display {
            font-size: 16px;
            color: #333;
            line-height: 2.2;
            text-align: center;
            letter-spacing: 2px;
            padding: 20px 0;
            font-weight: 500;
        }

        .profile-main {
            flex: 1;
        }

        .section-header {
            font-size: 26px;
            color: #8c222c;
            letter-spacing: 4px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            font-weight: 900;
        }

        .section-header::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(140, 34, 44, 0.3), transparent);
            margin-left: 20px;
        }

        .form-row {
            display: flex;
            gap: 40px;
            margin-bottom: 35px;
        }

        .input-group {
            flex: 1;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .classic-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #ccc;
            padding: 8px 0;
            font-size: 15px;
            font-family: inherit;
            color: #2c2c2c;
            outline: none;
            transition: border-color 0.4s;
        }

        .classic-input:focus {
            border-bottom-color: #8c222c;
        }

        .classic-input::placeholder {
            color: #ccc;
            font-size: 13px;
        }

        textarea.classic-input {
            resize: none;
            line-height: 1.8;
            border: 1px solid #e0dcd5;
            padding: 15px;
            background: rgba(255,255,255,0.4);
        }

        textarea.classic-input:focus {
            border-color: #8c222c;
            background: transparent;
        }

        .btn-elegant {
            background: transparent;
            color: #8c222c;
            border: 1px solid #8c222c;
            padding: 12px 40px;
            font-family: inherit;
            font-size: 14px;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.4s;
            margin-top: 20px;
        }

        .btn-elegant:hover {
            background: #8c222c;
            color: #fff;
        }

        @media (max-width: 800px) {
            .xiaozhu-layout {
                flex-direction: column;
                gap: 40px;
            }
            .profile-side {
                border-right: none;
                border-bottom: 1px dashed rgba(0,0,0,0.1);
                padding-right: 0;
                padding-bottom: 40px;
            }
            .form-row {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" class="logo serif-text" data-i18n="logo">古建智传</a>
            <nav>
                <a href="index.html" data-i18n="nav_home">首页</a>
                <a href="search.html" data-i18n="nav_search">营造索引</a>
                <a href="chat.html" data-i18n="nav_chat">与匠对谈</a>
                <a href="forum.html" data-i18n="nav_forum">梁间集语</a>
                <button id="translateBtn" class="translate-switch">EN</button>
                <div id="nav-user-area" style="display: inline-flex; align-items: center; gap: 20px; margin-left: 20px;"></div>
            </nav>
        </header>
    </div>

    <div class="xiaozhu-layout">
        <aside class="profile-side">
            <div class="seal-wrapper">
                <div class="seal-inner">匠</div>
            </div>
            <h2 class="user-title" id="dynamicUsername">加载中...</h2>
            <div class="user-bio-display" id="bioDisplay">
                落纸云烟，皆是营造<br>
                在这里记录你的古建求索之路
            </div>
        </aside>

        <main class="profile-main">
            <form id="profileForm" onsubmit="event.preventDefault();">
                <div class="section-header" data-i18n="profile_section_info">卷册信息</div>

                <div class="form-row">
                    <div class="input-group">
                        <label data-i18n="profile_username">雅号</label>
                        <input type="text" id="usernameInput" class="classic-input" disabled style="color: #999;">
                    </div>
                    <div class="input-group">
                        <label data-i18n="profile_email">信札 (邮箱)</label>
                        <input type="email" id="emailInput" class="classic-input" disabled style="color: #999;">
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label data-i18n="profile_gender">性别</label>
                        <select id="genderSelect" class="classic-input">
                            <option value="hidden" data-i18n="profile_gender_hidden">隐去身形</option>
                            <option value="male" data-i18n="profile_gender_male">男</option>
                            <option value="female" data-i18n="profile_gender_female">女</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label data-i18n="profile_age">春秋 (年岁)</label>
                        <input type="number" id="ageInput" class="classic-input" placeholder="输入芳龄" min="1" max="120" data-i18n="profile_age_placeholder">
                    </div>
                </div>

                <div class="input-group" style="margin-bottom: 60px;">
                    <label data-i18n="profile_bio">营造感言</label>
                    <textarea id="bioInput" class="classic-input" rows="4" placeholder="写下你与古建筑的不解之缘..." data-i18n="profile_bio_placeholder"></textarea>
                </div>

                <div class="section-header" data-i18n="profile_section_password">口令重铸</div>

                <div class="form-row">
                    <div class="input-group">
                        <label data-i18n="profile_old_password">原口令</label>
                        <input type="password" id="oldPasswordInput" class="classic-input" placeholder="输入当前使用的密码" data-i18n="profile_old_password_placeholder">
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label data-i18n="profile_new_password">新口令</label>
                        <input type="password" id="newPasswordInput" class="classic-input" placeholder="8位以上包含字母与数字" data-i18n="profile_new_password_placeholder">
                    </div>
                    <div class="input-group">
                        <label data-i18n="profile_confirm_password">复验新口令</label>
                        <input type="password" id="confirmPasswordInput" class="classic-input" placeholder="再次输入确认" data-i18n="profile_confirm_password_placeholder">
                    </div>
                </div>

                <div style="text-align: right;">
                    <button type="button" class="btn-elegant" id="saveBtn" data-i18n="profile_save">落笔封存</button>
                </div>
            </form>
        </main>
    </div>

    <script src="/assets/js/site.js"></script>
    <script src="/assets/js/translate.js"></script>
    <script src="/assets/js/music.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const response = await fetch('/api/me', { credentials: 'same-origin' });
                const data = await response.json();
                
                if (response.ok && data.user) {
                    const username = data.user.username;
                    const email = data.user.email;
                    
                    document.getElementById('dynamicUsername').textContent = username;
                    document.getElementById('usernameInput').value = username;
                    document.getElementById('emailInput').value = email;
                } else {
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error("拉取真实信息失败", error);
            }
        });

        const bioInput = document.getElementById('bioInput');
        const bioDisplay = document.getElementById('bioDisplay');
        
        if (bioInput) {
            bioInput.addEventListener('input', function(e) {
                if (e.target.value.trim() === '') {
                    bioDisplay.innerHTML = '落纸云烟，皆是营造<br>在这里记录你的古建求索之路';
                } else {
                    bioDisplay.innerHTML = e.target.value.replace(/\n/g, '<br>');
                }
            });
        }

        const saveBtn = document.getElementById('saveBtn');
        if (saveBtn) {
            saveBtn.addEventListener('click', function() {
                alert('功能暂未开放');
            });
        }
    </script>
</body>
</html>
