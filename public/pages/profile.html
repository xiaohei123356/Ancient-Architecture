    <script>
        // 【核心修改点】页面一加载，就去后端拿真实身份填充坑位
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const response = await fetch('/api/me', { credentials: 'same-origin' });
                const data = await response.json();
                
                if (response.ok && data.user) {
                    const username = data.user.username;
                    const email = data.user.email;
                    
                    // 填入真实名字和邮箱
                    document.getElementById('dynamic-username').textContent = username;
                    document.getElementById('dynamic-input-name').value = username;
                    document.getElementById('dynamic-input-email').value = email;
                    
                    // 让印章显示名字的第一个字（或字母）
                    document.getElementById('dynamic-seal').textContent = username.charAt(0).toUpperCase();
                } else {
                    // 没登录的人，一脚踢去登录页
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error("拉取真实信息失败", error);
            }
        });

        // 实时同步简介
        document.getElementById('bioInput').addEventListener('input', function(e) {
            const display = document.getElementById('bioDisplay');
            if (e.target.value.trim() === '') {
                display.innerHTML = '落纸云烟，皆是营造<br>在这里记录你的古建求索之路';
            } else {
                // 将换行符转换为 <br> 保持格式
                display.innerHTML = e.target.value.replace(/\n/g, '<br>');
            }
        });
        // 退出登录逻辑

    </script>
