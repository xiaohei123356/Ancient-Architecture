<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>营造索引 | 古建智传</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    
    <style>
        .search-section {
            padding: 80px 0 60px;
            text-align: center;
        }

        .search-title {
            font-size: 32px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 40px;
            letter-spacing: 4px;
        }

        .search-box {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            border-bottom: 2px solid #d6d0c4;
            transition: border-color 0.3s ease;
        }

        .search-box:focus-within {
            border-bottom-color: #8b1818;
        }

        .search-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            padding: 15px 20px;
            font-size: 18px;
            color: #333;
            outline: none;
        }

        .search-input::placeholder {
            color: #aaa;
            font-weight: 300;
        }

        .search-btn {
            background: transparent;
            border: none;
            color: #8b1818;
            font-size: 16px;
            font-weight: 600;
            padding: 0 20px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: opacity 0.3s;
        }

        .search-btn:hover {
            opacity: 0.7;
        }

        .index-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
            padding-bottom: 120px;
        }

        .category-card {
            background: #fff;
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid #eae5de;
            transition: all 0.4s ease;
            text-decoration: none;
            display: block;
        }

        .category-card:hover {
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            border-color: transparent;
        }

        .card-img {
            height: 240px;
            overflow: hidden;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .category-card:hover .card-img img {
            transform: scale(1.05);
        }

        .card-info {
            padding: 25px 30px 10px;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }

        .card-info h3 {
            font-size: 24px;
            color: #1a1a1a;
            margin: 0;
            letter-spacing: 2px;
        }

        .card-info span {
            font-size: 14px;
            color: #8b1818;
            letter-spacing: 1px;
        }

        .card-desc {
            padding: 0 40px 40px;
            font-size: 15px;
            color: #666;
            line-height: 1.8;
            margin: 0;
        }

        .category-filters {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid #d6d0c4;
            color: #666;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif SC', serif;
        }

        .filter-btn:hover {
            border-color: #8b1818;
            color: #8b1818;
        }

        .filter-btn.active {
            background: #8b1818;
            border-color: #8b1818;
            color: #fff;
        }

        .card-category-tag {
            display: inline-block;
            background: #fbf8f3;
            border: 1px solid #eadfd5;
            color: #8b1818;
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
        }
        
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 0;
            color: #999;
            font-size: 16px;
            letter-spacing: 2px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #fbf8f3;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            position: relative;
            border-radius: 4px;
            overflow-y: auto;
            animation: modalFadeIn 0.4s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-btn {
            position: absolute;
            right: 20px;
            top: 10px;
            font-size: 35px;
            cursor: pointer;
            color: #8b1818;
            z-index: 10;
        }

        .modal-body {
            display: flex;
            flex-direction: column;
        }

        .modal-image-wrap img {
            width: 100%;
            height: 450px;
            object-fit: cover;
        }

        .modal-text {
            padding: 40px;
        }

        .modal-text h2 {
            font-size: 32px;
            margin: 15px 0;
            color: #1a1a1a;
        }

        .modal-text p {
            font-size: 16px;
            line-height: 2;
            color: #555;
            margin-bottom: 30px;
            text-align: justify;
        }

        .external-link-btn {
            display: inline-block;
            background: #8b1818;
            color: #fff;
            padding: 12px 30px;
            text-decoration: none;
            letter-spacing: 2px;
            transition: background 0.3s;
        }

        .external-link-btn:hover {
            background: #6a1010;
        }

        @media (max-width: 768px) {
            .modal-image-wrap img { height: 250px; }
            .modal-text { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" class="logo serif-text">古建智传</a>
            <nav>
                <a href="index.html">首页</a>
                <a href="search.html">营造索引</a>
                <a href="chat.html">与匠对谈</a>
                <a href="forum.html">梁间集语</a>
                <button id="translateBtn" class="translate-switch">EN</button>
                <div id="nav-user-area" style="display: inline-flex; align-items: center; gap: 20px; margin-left: 20px;"></div>
            </nav>
        </header>

        <section class="search-section">
            <h2 class="search-title serif-text" id="searchTitle">浩渺图籍 · 一键寻踪</h2>
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="输入古建名称或关键词，例如：赵州桥...">
                <button class="search-btn serif-text" id="searchBtn">检索</button>
            </div>
            
            <div class="category-filters" id="categoryFilters">
                <button class="filter-btn active" data-category="all" id="filterAll">全部</button>
                <button class="filter-btn" data-category="民居" id="filterResidence">民居</button>
                <button class="filter-btn" data-category="官府" id="filterGovernment">官府</button>
                <button class="filter-btn" data-category="礼制" id="filterRitual">礼制</button>
                <button class="filter-btn" data-category="桥梁" id="filterBridge">桥梁</button>
            </div>
        </section>

        <section class="index-grid" id="buildingGrid"></section>

    </div>

    <div id="detailModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-body">
                <div class="modal-image-wrap">
                    <img id="modalImg" src="" alt="">
                </div>
                <div class="modal-text">
                    <span id="modalCategory" class="card-category-tag"></span>
                    <h2 id="modalTitle" class="serif-text"></h2>
                    <p id="modalDesc"></p>
                    <a id="modalExternalLink" href="" target="_blank" class="external-link-btn">查阅详细卷宗 (百度百科)</a>
                </div>
            </div>
        </div>
    </div>

    <button id="addBuildingBtn" onclick="openAddModal()" style="position: fixed; bottom: 40px; right: 40px; background: #8c222c; color: white; border: none; padding: 15px 25px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(140, 34, 44, 0.4); z-index: 99; transition: transform 0.3s;">
            + 补全卷册
        </button>

        <div id="addBuildingModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(250, 248, 245, 0.9); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
            <div style="background: #fff; padding: 40px; border: 1px solid rgba(140, 34, 44, 0.2); width: 100%; max-width: 450px; box-shadow: 0 10px 40px rgba(0,0,0,0.05);">
                <h3 class="serif-text" style="margin-top: 0; color: #8c222c; font-size: 24px; text-align: center; letter-spacing: 2px;">贡献古建资料</h3>
                <p style="color: #666; font-size: 13px; text-align: center; margin-bottom: 25px;">（您提交的建筑信息需经本馆典校审核通过后，方可入册展示。）</p>
                
                <input type="text" id="bName" placeholder="建筑雅称 (必填，如: 佛光寺)" style="width: 100%; margin-bottom: 15px; padding: 12px 10px; border: none; border-bottom: 1px solid #ccc; outline: none; font-size: 16px;">
                
                <select id="bCategory" style="width: 100%; margin-bottom: 15px; padding: 12px 10px; border: none; border-bottom: 1px solid #ccc; outline: none; font-size: 16px; color: #555;">
                    <option value="民居">民居</option>
                    <option value="官府">官府</option>
                    <option value="礼制">礼制</option>
                    <option value="桥梁">桥梁</option>
                </select>
                
                <textarea id="bDesc" placeholder="简短营造特征 (必填)" style="width: 100%; height: 80px; margin-bottom: 15px; padding: 12px 10px; border: 1px solid #ccc; outline: none; font-size: 14px; resize: none;"></textarea>
                
                <input type="text" id="bImage" placeholder="图影链接 (选填，http...)" style="width: 100%; margin-bottom: 15px; padding: 12px 10px; border: none; border-bottom: 1px solid #ccc; outline: none; font-size: 14px;">
                <input type="text" id="bLink" placeholder="百科外链 (选填)" style="width: 100%; margin-bottom: 25px; padding: 12px 10px; border: none; border-bottom: 1px solid #ccc; outline: none; font-size: 14px;">
                
                <div style="display: flex; justify-content: space-between; gap: 15px;">
                    <button onclick="closeAddModal()" style="flex: 1; padding: 12px; cursor: pointer; background: transparent; border: 1px solid #999; color: #555; font-weight: bold;">暂不提交</button>
                    <button onclick="submitBuilding()" style="flex: 1; padding: 12px; background: #8c222c; color: white; border: none; cursor: pointer; font-weight: bold;">递交审查</button>
                </div>
            </div>
        </div>

        <script>
            // 弹窗控制逻辑
            function openAddModal() {
                // 判断是否登录（通过检查右上角的DOM状态）
                if(document.querySelector('a[href="login.html"]')) {
                    alert("客官，请先登堂入室（登录）方可贡献卷册。");
                    window.location.href = 'login.html';
                    return;
                }
                document.getElementById('addBuildingModal').style.display = 'flex';
            }
            
            function closeAddModal() {
                document.getElementById('addBuildingModal').style.display = 'none';
            }

            // 提交表单逻辑
            async function submitBuilding() {
                const data = {
                    name: document.getElementById('bName').value,
                    category: document.getElementById('bCategory').value,
                    short_desc: document.getElementById('bDesc').value,
                    image_url: document.getElementById('bImage').value,
                    external_link: document.getElementById('bLink').value
                };

                if(!data.name || !data.short_desc) return alert("客官，雅称与描述不可留白。");

                try {
                    const response = await fetch('/api/buildings/submit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    const resData = await response.json();
                    
                    if(response.ok) {
                        alert(resData.message);
                        closeAddModal();
                        // 清空输入框
                        document.getElementById('bName').value = '';
                        document.getElementById('bDesc').value = '';
                        document.getElementById('bImage').value = '';
                        document.getElementById('bLink').value = '';
                    } else {
                        alert(resData.message);
                    }
                } catch (err) {
                    alert("网络异常，卷册未能送达。");
                }
            }
        </script>
    

    <script>
        const buildingGrid = document.querySelector('.index-grid');
        const searchInput = document.querySelector('.search-input');
        const searchBtn = document.querySelector('.search-btn');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const modal = document.querySelector('.modal-overlay');
        const closeBtn = document.querySelector('.close-btn');

        let allBuildings = [];

        async function fetchBuildings() {
            try {
                const lang = localStorage.getItem('preferred_language') || 'zh';
                const jsonFile = lang === 'en' ? '/buildings_en.json' : '/buildings.json';
                
                console.log("正在加载: " + jsonFile);
                const response = await fetch(jsonFile);
                if (!response.ok) throw new Error('网络请求状态码: ' + response.status);
                
                allBuildings = await response.json();
                console.log("成功拿到数据，共计：" + allBuildings.length + " 条");
                renderCards(allBuildings);
            } catch (error) {
                console.error("致命错误 - 数据加载失败:", error);
                buildingGrid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #8b1818;">
                        <h3>【 卷宗加载失败 】</h3>
                        <p>数据文件加载失败，请检查网络或刷新重试。</p>
                    </div>`;
            }
        }

        function renderCards(data) {
            buildingGrid.innerHTML = ''; 

            if (data.length === 0) {
                buildingGrid.innerHTML = '<div class="no-results">【 浩渺图籍中，暂未寻得此古建 】</div>';
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.style.cursor = 'pointer';
                card.innerHTML = `
                    <div class="card-img">
                        <img src="${item.image_url}" alt="${item.name}" loading="lazy">
                    </div>
                    <div class="card-info">
                        <span class="card-category-tag">${item.category}</span>
                        <h3 class="serif-text">${item.name}</h3>
                    </div>
                    <p class="card-desc">${item.short_desc}</p>
                `;
                
                card.onclick = () => openModal(item);
                buildingGrid.appendChild(card);
            });
        }

        function openModal(item) {
            document.getElementById('modalImg').src = item.image_url;
            document.getElementById('modalTitle').textContent = item.name;
            document.getElementById('modalCategory').textContent = item.category;
            document.getElementById('modalDesc').textContent = item.short_desc;
            document.getElementById('modalExternalLink').href = item.external_link;
            
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; 
        }

        if(closeBtn) {
            closeBtn.onclick = () => {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            };
        }

        window.onclick = (event) => {
            if (event.target == modal) {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        };

        function applyFilters() {
            const keyword = searchInput.value.trim().toLowerCase();
            const activeBtn = document.querySelector('.filter-btn.active');
            const activeCategory = activeBtn ? activeBtn.dataset.category : 'all';

            const filtered = allBuildings.filter(item => {
                const matchKeyword = item.name.toLowerCase().includes(keyword) || item.short_desc.toLowerCase().includes(keyword);
                const matchCategory = activeCategory === 'all' || item.category === activeCategory;
                return matchKeyword && matchCategory;
            });

            renderCards(filtered);
        }

        if(searchInput) searchInput.addEventListener('input', applyFilters);
        
        if(searchInput) {
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') applyFilters();
            });
        }

        if(searchBtn) searchBtn.addEventListener('click', applyFilters);

        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                applyFilters();
            });
        });

        document.addEventListener('DOMContentLoaded', fetchBuildings);
        
        // 监听语言切换，重新加载数据
        window.addEventListener('storage', function(e) {
            if (e.key === 'preferred_language') {
                fetchBuildings();
            }
        });
        
        // 添加一个全局函数，供 translate.js 调用
        window.reloadBuildings = fetchBuildings;
    </script>
    <script src="/assets/js/site.js"></script>
    <script src="/assets/js/translate.js"></script>
    <script src="/assets/js/music.js"></script>
</body>
</html>
