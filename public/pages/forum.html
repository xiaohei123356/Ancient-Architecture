<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梁间集语 | 古建智传</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    
    <style>
        body.forum-page {
            overflow: hidden;
        }

        .forum-shell {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .forum-header {
            text-align: center;
            padding: 20px 0 14px;
            flex-shrink: 0;
        }

        .forum-header h2 {
            font-size: 32px;
            color: #1a1a1a;
            letter-spacing: 4px;
            margin-bottom: 15px;
        }

        .forum-header p {
            font-size: 15px;
            color: #666;
            letter-spacing: 2px;
        }

        .forum-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 60px;
            flex: 1;
            min-height: 0;
            align-items: start;
            padding: 8px 0 32px;
        }

        .post-form-wrapper {
            background: #fff;
            padding: 40px 30px;
            border: 1px solid #eae5de;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            position: static;
            align-self: start;
            width: 100%;
            max-width: 350px;
        }

        .post-form-wrapper h3 {
            font-size: 20px;
            color: #8b1818;
            margin-bottom: 30px;
            border-bottom: 1px solid #eae5de;
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .form-input, .form-textarea {
            width: 100%;
            background: #FAFAFA;
            border: 1px solid #eae5de;
            padding: 12px 15px;
            font-size: 14px;
            color: #333;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-input:focus, .form-textarea:focus {
            border-color: #8b1818;
            background: #fff;
        }

        .submit-btn {
            width: 100%;
            background: #8b1818;
            color: #fff;
            border: none;
            padding: 15px 0;
            font-size: 16px;
            letter-spacing: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background: #6a1010;
        }

        .form-message {
            display: block;
            min-height: 50px;
            margin-top: 16px;
            padding: 10px 12px;
            font-size: 13px;
            line-height: 1.7;
            color: #8b1818;
            background: #fbf8f3;
            border: 1px solid #eadfd5;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .form-message.show {
            visibility: visible;
            opacity: 1;
        }

        .form-message.success {
            color: #2f6b3d;
            background: #f4faf5;
            border-color: #d5e6d8;
        }

        .message-feed {
            display: flex;
            flex-direction: column;
            gap: 30px;
            height: 100%;
            overflow-y: auto;
            min-height: 0;
            padding-right: 8px;
        }

        .message-feed::-webkit-scrollbar {
            width: 6px;
        }

        .message-feed::-webkit-scrollbar-thumb {
            background: #d6d0c4;
            border-radius: 3px;
        }

        .post-card {
            background: #fff;
            padding: 35px 40px;
            border: 1px solid #eae5de;
            border-left: 3px solid #d6d0c4;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideDown 0.5s ease forwards;
        }

        .post-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            border-left-color: #8b1818;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .post-author {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .post-date {
            font-size: 13px;
            color: #999;
            font-family: sans-serif;
        }

        .post-content {
            font-size: 15px;
            color: #555;
            line-height: 1.8;
            text-align: justify;
            white-space: pre-wrap;
        }

        @media (max-width: 800px) {
            body.forum-page {
                overflow: auto;
            }

            .forum-shell {
                height: auto;
            }

            .forum-layout {
                grid-template-columns: 1fr;
                height: auto;
                padding-bottom: 40px;
            }

            .post-form-wrapper {
                position: static;
                max-width: none;
            }

            .message-feed {
                max-height: none;
                overflow: visible;
            }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="forum-page">

    <div class="container forum-shell">
        <header>
            <a href="index.html" class="logo serif-text">古建智传</a>
            <nav>
                <a href="index.html" data-i18n="nav_home">首页</a>
                <a href="search.html" data-i18n="nav_search">营造索引</a>
                <a href="chat.html" class="active" data-i18n="nav_chat">与匠对谈</a>
                <a href="forum.html" data-i18n="nav_forum">梁间集语</a>
                <button id="translateBtn" class="translate-switch">EN</button>
                <div id="nav-user-area" style="display: inline-flex; align-items: center; gap: 20px; margin-left: 20px;"></div>
            </nav>
        </header>

        <div class="forum-header">
            <h2 class="serif-text" id="forumTitle">梁间集语</h2>
            <p id="forumSubtitle">寻同好，论古建，留墨香于此</p>
        </div>

        <div class="forum-layout">
            <div class="post-form-wrapper">
    <h3 class="serif-text" id="forumFormTitle">提笔落墨</h3>
    <div class="form-group">
        <label class="form-label" id="authorLabel">雅号 (昵称)</label>
        <input type="text" id="authorInput" class="form-input" placeholder="客官尊姓大名？">
    </div>
    <div class="form-group">
        <label class="form-label" id="contentLabel">所感所想</label>
        <textarea id="contentInput" class="form-textarea" placeholder="在此写下您对古建的感悟或疑问..."></textarea>
    </div>
    <button id="publishBtn" class="submit-btn serif-text">留 墨</button>
                <div id="formMessage" class="form-message" aria-live="polite"></div>
            </div>

            <div class="message-feed" id="messageFeed"></div>
        </div>
    </div>

   <script>
        const publishBtn = document.getElementById('publishBtn');
        const authorInput = document.getElementById('authorInput');
        const contentInput = document.getElementById('contentInput');
        const messageFeed = document.getElementById('messageFeed');
        const formMessage = document.getElementById('formMessage');
        const currentReplyTargets = {};

        function showFormMessage(message, type = 'error') {
            formMessage.textContent = message;
            formMessage.className = `form-message show ${type}`;
        }

        function clearFormMessage() {
            formMessage.textContent = '';
            formMessage.className = 'form-message';
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function loadCurrentUser() {
            const response = await fetch('/api/me', { credentials: 'same-origin' });
            const data = await response.json();
            return data.user || null;
        }

        async function loadPosts() {
            const response = await fetch('/api/posts', { credentials: 'same-origin' });
            const data = await response.json();
            const posts = data.posts || [];

            messageFeed.innerHTML = posts.map((post) => {
                let repliesHtml = '';
                if (post.replies.length > 0) {
                    const firstReply = post.replies[0];
                    const restReplies = post.replies.slice(1);
                    const renderReply = (r) => `
                        <div class="reply-item" onclick="prepareReply(${post.id}, '${escapeHtml(r.username)}')">
                            <span class="reply-author">${escapeHtml(r.username)}</span>
                            ${r.target_username ? `<span class="reply-target">回复 @${escapeHtml(r.target_username)}</span>` : ''}
                            <span class="reply-content">: ${escapeHtml(r.content)}</span>
                            <span class="reply-date">${escapeHtml(String(r.created_at).slice(5, 16))}</span>
                        </div>
                    `;

                    repliesHtml += `<div class="replies-section">${renderReply(firstReply)}`;
                    if (restReplies.length > 0) {
                        repliesHtml += `
                            <div id="rest-replies-${post.id}" style="display: none;">${restReplies.map(renderReply).join('')}</div>
                            <button class="expand-replies-btn" id="expand-btn-${post.id}" onclick="toggleRestReplies(${post.id}, ${restReplies.length})">展开其余 ${restReplies.length} 条探讨 ↓</button>
                        `;
                    }
                    repliesHtml += `</div>`;
                }

                return `
                <div class="post-card">
                    <div class="post-header">
                        <span class="post-author serif-text">${escapeHtml(post.username)}</span>
                        <span class="post-date">${escapeHtml(String(post.created_at).slice(0, 10))}</span>
                    </div>
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    
                    <div class="post-footer">
                        <button class="action-btn ${post.liked_by_me ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                            ${post.liked_by_me ? '♥ 已赞' : '♡ 赞'} (${post.likes})
                        </button>
                        <button class="action-btn" onclick="toggleReplyBox(${post.id})">💬 探讨 (${post.replies.length})</button>
                    </div>

                    ${repliesHtml}

                    <div class="reply-input-box" id="replyBox-${post.id}" style="display: none;">
                        <input type="text" id="replyInput-${post.id}" placeholder="写下你的探讨...">
                        <button onclick="submitReply(${post.id})">发送</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function toggleRestReplies(postId, count) {
            const div = document.getElementById(`rest-replies-${postId}`);
            const btn = document.getElementById(`expand-btn-${postId}`);
            if (div.style.display === 'none') {
                div.style.display = 'block';
                btn.textContent = '收起探讨 ↑';
            } else {
                div.style.display = 'none';
                btn.textContent = `展开其余 ${count} 条探讨 ↓`;
            }
        }

        async function toggleLike(postId) {
            const me = await loadCurrentUser();
            if (!me) return window.location.href = 'login.html';
            await fetch('/api/posts/like', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ postId }),
                credentials: 'same-origin'
            });
            loadPosts();
        }

        function toggleReplyBox(postId) {
            const box = document.getElementById(`replyBox-${postId}`);
            const input = document.getElementById(`replyInput-${postId}`);
            box.style.display = box.style.display === 'none' ? 'flex' : 'none';
            input.placeholder = "写下你的探讨...";
            currentReplyTargets[postId] = null;
        }

        function prepareReply(postId, targetUsername) {
            const box = document.getElementById(`replyBox-${postId}`);
            const input = document.getElementById(`replyInput-${postId}`);
            box.style.display = 'flex'; 
            input.placeholder = `回复 @${targetUsername} :`;
            currentReplyTargets[postId] = targetUsername;
            input.focus();
        }

        async function submitReply(postId) {
            const me = await loadCurrentUser();
            if (!me) return window.location.href = 'login.html';

            const input = document.getElementById(`replyInput-${postId}`);
            const content = input.value.trim();
            const targetUsername = currentReplyTargets[postId] || null;

            if (!content) return alert("探讨内容不可为空。");

            const res = await fetch('/api/posts/reply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ postId, content, targetUsername }),
                credentials: 'same-origin'
            });
            
            if (res.ok) {
                input.value = '';
                currentReplyTargets[postId] = null;
                loadPosts(); 
            } else {
                alert((await res.json()).message);
            }
        }

        publishBtn.addEventListener('click', async function() {
    clearFormMessage();
    const content = contentInput.value.trim();

    if (content === '') {
        showFormMessage('客官，所感需落墨，方可留存。');
        return;
    }

    try {
        const me = await loadCurrentUser();
        if (!me) {
            showFormMessage('请先登录后再留墨。');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 800);
            return;
        }

        const response = await fetch('/api/posts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content }),
            credentials: 'same-origin'
        });

        const data = await response.json();
        if (!response.ok) {
            throw new Error(data.message || '留墨失败，请稍后再试。');
        }

        authorInput.value = me.username;
        contentInput.value = '';
        await loadPosts();
        showFormMessage('落墨成功，您的文字已被永久留存于梁间集语。', 'success');
    } catch (error) {
        showFormMessage(error.message);
    }
});

        document.addEventListener('DOMContentLoaded', async function() {
            const me = await loadCurrentUser().catch(() => null);
            if (me) {
                authorInput.value = me.username;
            }
            loadPosts();
        });
    </script>
    <script src="/assets/js/site.js"></script>
    <script src="/assets/js/translate.js"></script>
    <script src="/assets/js/music.js"></script>
</body>
</html>
