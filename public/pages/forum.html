<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交流论坛 | 古建智汇</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div class="container forum-page">
    <header class="site-header">
      <a href="/index.html" class="logo serif-text">古建智汇</a>
      <nav class="main-nav">
        <a href="/index.html">首页</a>
        <a href="/search.html">资料检索</a>
        <a href="/chat.html">智能问答</a>
        <a href="/forum.html" class="active">交流论坛</a>
        <span class="nav-actions" data-auth-slot><a href="/login.html">注册 / 登录</a></span>
      </nav>
    </header>

    <section class="section-heading">
      <div>
        <span class="eyebrow serif-text">FORUM</span>
        <h1 class="serif-text">古建交流论坛</h1>
        <p class="panel-note">登录后可以发布看法、研究摘要或展示方案建议。</p>
      </div>
    </section>

    <div class="forum-layout">
      <aside class="forum-composer">
        <h2 class="serif-text">发布新帖</h2>
        <p id="composerStatus" class="panel-note">正在检查登录状态...</p>
        <form id="postForm" class="form-grid">
          <div class="form-field">
            <label for="contentInput">内容</label>
            <textarea id="contentInput" name="content" maxlength="300" placeholder="写下你对古建筑结构、保护策略或数字化展示的想法。" required></textarea>
          </div>
          <button id="publishButton" class="submit-button" type="submit">发布帖子</button>
        </form>
        <div id="forumMessage" class="message-bar" aria-live="polite"></div>
      </aside>

      <section class="forum-feed">
        <div class="section-heading">
          <div>
            <h2 class="serif-text">最新讨论</h2>
            <p class="panel-note">帖子内容会写入数据库并持久保存。</p>
          </div>
        </div>
        <div id="postEmpty" class="empty-state" hidden>当前还没有帖子，欢迎发布第一条内容。</div>
        <div id="postList" class="post-list"></div>
      </section>
    </div>
  </div>

  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/forum.js"></script>
</body>
</html>
