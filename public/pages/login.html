<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登堂入室 | 营造法式</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">

    <style>
        .login-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 132px);
            padding: 8px 0 16px;
        }

        .login-box {
            background: #fff;
            width: 100%;
            max-width: 440px;
            padding: 34px 42px 28px;
            border: 1px solid #eae5de;
            border-radius: 2px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            text-align: center;
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            margin-bottom: 20px;
        }

        .login-header h2 {
            font-size: 28px;
            color: #1a1a1a;
            letter-spacing: 6px;
            margin-bottom: 10px;
        }

        .login-header p {
            min-height: 21px;
            font-size: 14px;
            color: #8b1818;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 14px;
            text-align: left;
        }

        .input-group.hidden {
            display: none;
        }

        .login-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #d6d0c4;
            padding: 10px 0;
            font-size: 16px;
            color: #333;
            outline: none;
            transition: border-color 0.3s;
        }

        .login-input:focus {
            border-bottom-color: #8b1818;
        }

        .login-input::placeholder {
            color: #bbb;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .login-btn {
            width: 100%;
            background: #8b1818;
            color: #fff;
            border: none;
            padding: 15px 0;
            font-size: 16px;
            letter-spacing: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 2px;
        }

        .login-btn:hover {
            background: #6a1010;
            box-shadow: 0 5px 15px rgba(139, 24, 24, 0.2);
        }

        .message-wrap {
            min-height: 56px;
            margin-top: 14px;
        }

        .message-box {
            display: none;
            padding: 8px 12px;
            text-align: left;
            font-size: 13px;
            line-height: 1.7;
            border: 1px solid #e6d9ca;
            background: #fbf8f3;
            color: #8b1818;
        }

        .message-box.show {
            display: block;
        }

        .message-box.success {
            border-color: #d6e5d8;
            background: #f4faf5;
            color: #2c6b3d;
        }

        .login-footer {
            margin-top: 10px;
            min-height: 24px;
            font-size: 13px;
            color: #999;
        }

        .login-footer a {
            color: #8b1818;
            text-decoration: none;
            margin-left: 5px;
            transition: opacity 0.3s;
        }

        .login-footer a:hover {
            opacity: 0.7;
        }

        @media (max-height: 760px) {
            .login-section {
                min-height: auto;
                padding: 18px 0 20px;
            }

            .login-box {
                padding: 28px 36px 24px;
            }

            .login-header {
                margin-bottom: 18px;
            }

            .input-group {
                margin-bottom: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" class="logo serif-text">营造法式</a>
            <nav>
                <a href="index.html">首页</a>
                <a href="search.html">营造索引</a>
                <a href="chat.html">与匠对谈</a>
                <a href="forum.html">梁间集语</a>
                <a href="login.html" class="active">登录</a>
            </nav>
        </header>

        <section class="login-section">
            <div class="login-box">
                <div class="login-header">
                    <h2 class="serif-text" id="panelTitle">登堂入室</h2>
                    <p class="serif-text" id="panelSubtitle">卷轶浩繁 · 邀君共赏</p>
                </div>

                <form id="authForm">
                    <div class="input-group hidden" id="usernameGroup">
                        <input type="text" id="usernameInput" class="login-input" placeholder="雅号 (3-20 位字母、数字或下划线)" maxlength="20" autocomplete="username">
                    </div>
                    <div class="input-group hidden" id="emailGroup">
                        <input type="email" id="emailInput" class="login-input" placeholder="信札 (请输入常用邮箱)" maxlength="100" autocomplete="email">
                    </div>
                    <div class="input-group" id="accountGroup">
                        <input type="text" id="accountInput" class="login-input" placeholder="雅号 (请输入用户名或邮箱)" maxlength="100" autocomplete="username">
                    </div>
                    <div class="input-group" id="passwordGroup">
                        <input type="password" id="passwordInput" class="login-input" placeholder="口令 (请输入您的密码)" maxlength="64" autocomplete="current-password">
                    </div>
                    <div class="input-group hidden" id="confirmPasswordGroup">
                        <input type="password" id="confirmPasswordInput" class="login-input" placeholder="复验口令 (请再次输入密码)" maxlength="64" autocomplete="new-password">
                    </div>

                    <button type="submit" class="login-btn serif-text" id="submitButton">登 录</button>
                </form>

                <div class="message-wrap">
                    <div class="message-box" id="messageBox"></div>
                </div>

                <div class="login-footer" id="footerText">
                    尚未结缘？<a href="#" id="toggleModeLink">在此缔结</a>
                </div>
            </div>
        </section>
    </div>

    <script>
        const state = { mode: 'login' };

        const authForm = document.getElementById('authForm');
        const panelTitle = document.getElementById('panelTitle');
        const panelSubtitle = document.getElementById('panelSubtitle');
        const usernameGroup = document.getElementById('usernameGroup');
        const emailGroup = document.getElementById('emailGroup');
        const accountGroup = document.getElementById('accountGroup');
        const passwordInput = document.getElementById('passwordInput');
        const confirmPasswordGroup = document.getElementById('confirmPasswordGroup');
        const confirmPasswordInput = document.getElementById('confirmPasswordInput');
        const submitButton = document.getElementById('submitButton');
        const footerText = document.getElementById('footerText');
        const messageBox = document.getElementById('messageBox');

        function showMessage(message, type = 'error') {
            messageBox.textContent = message;
            messageBox.className = `message-box show ${type}`;
        }

        function clearMessage() {
            messageBox.textContent = '';
            messageBox.className = 'message-box';
        }

        function bindToggleLink(nextMode) {
            const link = document.getElementById('toggleModeLink');
            link.addEventListener('click', function(event) {
                event.preventDefault();
                setMode(nextMode);
            });
        }

        function setMode(mode) {
            const isLogin = mode === 'login';
            state.mode = mode;

            panelTitle.textContent = isLogin ? '登堂入室' : '在此缔结';
            panelSubtitle.textContent = isLogin ? '卷轶浩繁 · 邀君共赏' : '名录既成 · 共观营造';

            usernameGroup.classList.toggle('hidden', isLogin);
            emailGroup.classList.toggle('hidden', isLogin);
            confirmPasswordGroup.classList.toggle('hidden', isLogin);
            accountGroup.classList.toggle('hidden', !isLogin);

            passwordInput.placeholder = isLogin
                ? '口令 (请输入您的密码)'
                : '口令 (至少 8 位，含大小写字母和数字)';
            passwordInput.autocomplete = isLogin ? 'current-password' : 'new-password';

            submitButton.textContent = isLogin ? '登 录' : '注 册';
            footerText.innerHTML = isLogin
                ? '尚未结缘？<a href="#" id="toggleModeLink">在此缔结</a>'
                : '已有名录？<a href="#" id="toggleModeLink">返回登录</a>';
            bindToggleLink(isLogin ? 'register' : 'login');

            authForm.reset();
            clearMessage();
        }

        authForm.addEventListener('submit', async function(event) {
            event.preventDefault();
            clearMessage();

            if (state.mode === 'login') {
                const account = document.getElementById('accountInput').value.trim();
                const password = passwordInput.value;

                if (!account || !password) {
                    showMessage('客官，雅号与口令缺一不可。');
                    return;
                }

                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ account, password })
                    });

                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(data.message || '登录失败，请稍后再试。');
                    }

                    showMessage(`鉴权成功，欢迎归来，${data.user.username} 客官。即将为您开启营造法式的大门。`, 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 700);
                } catch (error) {
                    showMessage(error.message);
                }
                return;
            }

            const username = document.getElementById('usernameInput').value.trim();
            const email = document.getElementById('emailInput').value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (!username || !email || !password || !confirmPassword) {
                showMessage('客官，注册信息需完整填写。');
                return;
            }

            if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
                showMessage('雅号需为 3 到 20 位字母、数字或下划线。');
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showMessage('请填写有效的邮箱地址。');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('两次口令不一致，请重新核对。');
                return;
            }

            if (password.length < 8 || password.length > 64) {
                showMessage('口令长度需在 8 到 64 位之间。');
                return;
            }

            if (!/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/\d/.test(password)) {
                showMessage('口令需同时包含大写字母、小写字母和数字。');
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password, confirmPassword })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.message || '注册失败，请稍后再试。');
                }

                setMode('login');
                showMessage('缔结成功，新账号已记入卷册，请使用刚刚填写的信息登录。', 'success');
            } catch (error) {
                showMessage(error.message);
            }
        });

        bindToggleLink('register');
    </script>
    <script src="/assets/js/site.js"></script>
</body>
</html>
